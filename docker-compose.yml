version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - resume-analyzer-network
    # Wait for the service to be ready and pull the model
    # A simple way to do this is to run the model in background or execute pull right after start
    # But since it's the official container, we let it run natively and add an init step or use host script.
    # We will use an init script to pull the model so it persists automatically.
    entrypoint: [ "/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llama3.2:1b && wait" ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/app.db
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:1b
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_reports:/app/reports
      - sqlite_data:/app/data
      - ./backend/cache_data.json:/app/cache_data.json  # Note: if JSON is persisted locally. Better to put it in /data instead.
    networks:
      - resume-analyzer-network
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/jobs/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - resume-analyzer-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  ollama_models:
  backend_uploads:
  backend_reports:
  sqlite_data:

networks:
  resume-analyzer-network:
    driver: bridge
